<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI数据驾驶舱｜开发落地原型</title><style>
:root{--bg:#06101b;--panel:#0a1c2b;--line:#1d425c;--cyan:#40d8ff;--green:#39d6a0;--amber:#f5bd4d;--red:#ff6e82;--text:#e8f5fd;--muted:#7898ab}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#06101b;color:var(--text);font:13px Arial,'Microsoft YaHei',sans-serif}body{background:radial-gradient(circle at 50% 20%,#11344b 0,transparent 43%),linear-gradient(rgba(38,83,108,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(38,83,108,.08) 1px,transparent 1px);background-size:auto,42px 42px,42px 42px}.app{height:100vh;min-width:1180px;display:grid;grid-template-rows:66px 1fr 34px;padding:0 18px}.top{display:flex;align-items:center;border-bottom:1px solid var(--line);gap:20px}.brand{min-width:390px}.brand small{color:var(--cyan);letter-spacing:2px}.brand h1{margin:4px 0 0;font-size:21px}.switcher{display:flex;align-items:center;height:40px;border:1px solid #2d5c77;background:#0a2233;border-radius:5px}.switcher button{width:38px;height:38px;border:0;background:transparent;color:var(--cyan);font-size:20px;cursor:pointer}.switcher select{height:38px;min-width:250px;border:0;border-left:1px solid #234a62;border-right:1px solid #234a62;background:#0a2233;color:var(--text);padding:0 14px;font-weight:700}.filters{margin-left:auto;display:flex;gap:7px}.filters select,.filters button{height:34px;border:1px solid #28516a;background:#0a2030;color:var(--text);border-radius:4px;padding:0 10px}.screen{padding:10px 0;display:grid;grid-template-columns:1fr 1.65fr 1fr;grid-template-rows:100px 1fr 190px;gap:9px;min-height:0}.kpis{grid-column:1/4;display:grid;grid-template-columns:repeat(5,1fr);gap:9px}.kpi,.panel{background:linear-gradient(145deg,rgba(13,37,53,.96),rgba(7,22,34,.98));border:1px solid var(--line);border-radius:5px;overflow:hidden}.kpi{padding:14px;position:relative}.kpi:after{content:"";position:absolute;left:0;bottom:0;height:2px;width:55%;background:var(--cyan)}.kpi span{color:var(--muted)}.kpi b{display:block;font:700 27px ui-monospace,monospace;color:var(--cyan);margin:6px 0 2px}.kpi small{color:var(--green)}.panel{padding:12px;min-height:0}.panel-head{height:30px;display:flex;align-items:start;justify-content:space-between}.panel-head h2{font-size:14px;margin:0}.panel-head span{font-size:9px;color:var(--cyan);letter-spacing:1px}.chartbox{height:calc(100% - 30px);position:relative}.chartbox svg{width:100%;height:100%;overflow:visible}.gridline{stroke:#19384d;stroke-width:1}.chart-label{fill:#7393a6;font-size:10px}.chart-value{fill:#dff4ff;font-size:10px}.chart-bar{fill:url(#barGrad)}.rank{display:grid;height:100%;align-content:space-around}.rank-row{display:grid;grid-template-columns:24px 82px 1fr 42px;align-items:center;gap:7px}.rank-row i{font-style:normal;color:var(--cyan)}.rank-row span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.track{height:7px;background:#153045;border-radius:4px;overflow:hidden}.track b{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),#3f72ff)}.donut-wrap{height:100%;display:grid;grid-template-columns:145px 1fr;align-items:center}.donut{width:130px;aspect-ratio:1;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--cyan) 0 46%,var(--green) 46% 72%,var(--amber) 72% 89%,#7359df 89%)}.donut:after{content:"";width:76px;aspect-ratio:1;border-radius:50%;background:#0b1f2e}.legend{display:grid;gap:10px}.legend div{display:flex;justify-content:space-between;border-bottom:1px solid #17354a;padding-bottom:7px}.bottom-left{grid-column:1/2}.bottom-mid{grid-column:2/3}.bottom-right{grid-column:3/4}.matrix{display:grid;grid-template-columns:90px repeat(5,1fr);gap:4px;height:100%;align-items:stretch}.cell{display:grid;place-items:center;background:#113044;font-size:10px}.cell.hot{background:#176f83}.cell.mid{background:#145265}.cell.low{background:#17354a;color:#7898ab}.cell.head{background:transparent;color:#7898ab}.alerts{display:grid;gap:6px}.alert{display:grid;grid-template-columns:1fr auto;gap:6px;padding:8px;background:#0b2535;border-left:3px solid var(--amber)}.alert.risk{border-color:var(--red)}.alert small{color:var(--muted);grid-column:1/3}.pill{font-size:10px;color:var(--amber)}.actions{display:flex;gap:6px;margin-top:7px}.actions button{flex:1;height:29px;border:1px solid #28536d;background:#0d293b;color:var(--text);border-radius:3px;cursor:pointer}.actions button:hover{border-color:var(--cyan)}.foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);color:var(--muted);font-size:10px}.ai-btn{color:var(--cyan);cursor:pointer}.toast{position:fixed;right:18px;bottom:42px;background:#103246;border:1px solid var(--cyan);padding:10px 14px;border-radius:4px;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}.funnel{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px}.funnel div{height:25px;display:flex;justify-content:space-between;padding:5px 12px;background:linear-gradient(90deg,#176c86,#244e75);clip-path:polygon(5% 0,95% 0,100% 100%,0 100%)}.map{height:100%;position:relative;background:radial-gradient(ellipse at center,#123d54,transparent 65%)}.map .city{position:absolute;border:0;background:var(--cyan);width:9px;height:9px;border-radius:50%;box-shadow:0 0 10px var(--cyan);cursor:pointer}.map .city:after{content:attr(data-name);position:absolute;left:12px;top:-4px;color:#a9cede;font-size:10px;white-space:nowrap}.map .outline{position:absolute;inset:12% 20%;border:1px solid #2d6a82;clip-path:polygon(10% 30%,35% 5%,65% 12%,93% 38%,80% 83%,50% 96%,15% 75%);background:#0d2a3b}
</style></head><body><div class="app"><header class="top"><div class="brand"><small>AI DATA COCKPIT</small><h1 id="title">全校就业态势总览</h1></div><div class="switcher"><button id="prev" title="上一主题">‹</button><select id="theme"></select><button id="next" title="下一主题">›</button></div><div class="filters"><select id="role"><option>校领导</option><option>学院负责人</option><option>就业中心</option><option>辅导员</option><option>产业合作专员</option></select><select id="period"><option>2025届</option><option>2024届</option><option>近三届</option></select><select id="scope"><option>全校</option><option>智能制造学院</option><option>信息工程学院</option></select><button id="full">全屏</button></div></header><main class="screen"><section class="kpis" id="kpis"></section><section class="panel"><div class="panel-head"><h2 id="rankTitle"></h2><span>RANKING</span></div><div class="chartbox rank" id="rank"></div></section><section class="panel"><div class="panel-head"><h2 id="coreTitle"></h2><span>CORE ANALYSIS</span></div><div class="chartbox" id="core"></div></section><section class="panel"><div class="panel-head"><h2 id="structureTitle"></h2><span>STRUCTURE</span></div><div class="chartbox donut-wrap"><div class="donut" id="donut"></div><div class="legend" id="legend"></div></div></section><section class="panel bottom-left"><div class="panel-head"><h2 id="matrixTitle"></h2><span>MATRIX</span></div><div class="chartbox matrix" id="matrix"></div></section><section class="panel bottom-mid"><div class="panel-head"><h2 id="trendTitle"></h2><span>TREND / FLOW</span></div><div class="chartbox" id="trend"></div></section><section class="panel bottom-right"><div class="panel-head"><h2>预警洞察与行动</h2><span>AI ACTION</span></div><div class="alerts" id="alerts"></div><div class="actions"><button id="ai">AI解读</button><button id="task">生成任务</button><button id="detail">数据明细</button></div></section></main><footer class="foot"><span id="foot">统一指标口径 · 数据更新 2026-07-18 18:00 · 权限脱敏审计</span><span class="ai-btn" id="ask">数据透视 AI：支持问数、切页、筛选、高亮与下钻</span></footer></div><div class="toast" id="toast"></div><script>
const T=[
{name:'01 全校就业态势总览',titles:['学院就业排名','近三届落实率趋势','毕业去向结构','地区×行业流向','就业质量变化'],k:[['毕业生数','11,065','正式样本'],['落实率','91.47%','目标完成98.4%'],['待就业','327','环比-42'],['留桂率','50.75%','同比+2.1pp'],['对口度','86.79%','质量指标']],rank:['智能制造','交通运输','信息工程','商贸管理','艺术设计'],rv:[94,93,91,89,87],legend:[['单位就业','73.6%'],['升学','17.5%'],['待就业','8.5%'],['其他','0.4%']],alerts:['商贸管理学院低于校均值','3个专业连续两期下降','327名学生待就业'],mode:'line'},
{name:'02 学院和专业深度分析',titles:['专业竞争力排名','学院—专业竞争力矩阵','就业质量结构','专业×指标矩阵','培养有效性趋势'],k:[['学院落实率','92.80%','高于校均1.33pp'],['对口度','84.20%','低于校均2.59pp'],['平均薪资','5,860','元/月'],['满意度','88.60%','同比+2.1pp'],['升学率','17.52%','近三届最高']],rank:['新能源技术','智能控制','机械制造','工业机器人','工业设计'],rv:[96,93,91,87,84],legend:[['稳定就业','46%'],['升学深造','26%'],['灵活就业','17%'],['待就业','11%']],alerts:['工业设计对口度偏低','3项证书溢价不足','实训转正率仅42%'],mode:'matrix'},
{name:'03 市场需求与人才画像',titles:['热招岗位 Top10','专业—岗位—技能匹配','人才能力结构','专业×技能供需矩阵','岗位需求增幅趋势'],k:[['有效企业','2,416','近三月+186'],['有效岗位','12,684','新增+18.2%'],['需求人数','28,930','竞争度0.86'],['匹配人才','4,285','覆盖67.4%'],['平均薪资','6,420','元/月']],rank:['智能制造','新能源维修','工业软件','机器视觉','PLC工程师'],rv:[95,91,88,83,79],legend:[['高匹配','38%'],['中匹配','29%'],['低匹配','21%'],['待提升','12%']],alerts:['PLC技能缺口326人','机器视觉缺口214人','数字孪生缺口188人'],mode:'matrix'},
{name:'04 就业困难群体专题',titles:['学院困难比重','求职转化漏斗','困难类型结构','困难类型×服务矩阵','帮扶成效趋势'],k:[['困难学生','486','占比4.39%'],['落实率','79.80%','低校均11.67pp'],['帮扶覆盖','96.30%','今日新增12'],['未进展','68','重点跟进'],['解除率','62.40%','本月+5.8pp']],rank:['商贸管理','艺术设计','信息工程','交通运输','智能制造'],rv:[86,73,62,48,35],legend:[['求职技能','34%'],['学业能力','27%'],['地域限制','22%'],['心理经济','17%']],alerts:['超期未联系18人','长期零投递24人','Offer未签约10人'],mode:'funnel'},
{name:'05 智能制造产业人才供应',titles:['输送企业 Top10','广西智能制造合作地图','产业贡献结构','城市×产业贡献矩阵','人才输送趋势'],k:[['本届输送','1,864','智能制造人才'],['留桂率','68.20%','区内贡献'],['对口率','91.30%','高于校均'],['合作企业','328','连续招录76家'],['平均薪资','6,880','元/月']],rank:['上汽通用五菱','柳工集团','广西玉柴','东风柳汽','桂林福达'],rv:[96,89,82,75,68],legend:[['装备制造','35%'],['汽车产业','29%'],['新能源','21%'],['工业软件','15%']],alerts:['工业机器人缺口242人','MES技能缺口176人','3家企业留存率下降'],mode:'map'}];let c=0,$=s=>document.querySelector(s);$('#theme').innerHTML=T.map((t,i)=>`<option value="${i}">${t.name}</option>`).join('');
function line(vals=[62,70,68,78,84,91]){let pts=vals.map((v,i)=>`${35+i*72},${180-v*1.45}`).join(' ');return `<svg viewBox="0 0 420 190"><defs><linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#40d8ff"/><stop offset="1" stop-color="#265be0"/></linearGradient></defs>${[35,75,115,155].map(y=>`<line class="gridline" x1="28" y1="${y}" x2="405" y2="${y}"/>`).join('')}<polyline fill="none" stroke="#40d8ff" stroke-width="3" points="${pts}"/>${vals.map((v,i)=>`<circle cx="${35+i*72}" cy="${180-v*1.45}" r="4" fill="#39d6a0"/><text class="chart-value" x="${28+i*72}" y="${168-v*1.45}">${v}%</text>`).join('')}</svg>`}
function matrix(){return ['','A','B','C','D','E','专业1','hot','mid','hot','low','mid','专业2','mid','hot','hot','mid','low','专业3','low','mid','hot','hot','mid'].map((x,i)=>`<div class="cell ${['hot','mid','low'].includes(x)?x:i<6?'head':''}">${['hot','mid','low'].includes(x)?['92','76','54'][['hot','mid','low'].indexOf(x)]:x}</div>`).join('')}
function render(){let t=T[c];$('#title').textContent=t.name.slice(3);$('#theme').value=c;$('#kpis').innerHTML=t.k.map(x=>`<div class="kpi"><span>${x[0]}</span><b>${x[1]}</b><small>${x[2]}</small></div>`).join('');['rankTitle','coreTitle','structureTitle','matrixTitle','trendTitle'].forEach((id,i)=>$('#'+id).textContent=t.titles[i]);$('#rank').innerHTML=t.rank.map((x,i)=>`<div class="rank-row"><i>0${i+1}</i><span>${x}</span><div class="track"><b style="width:${t.rv[i]}%"></b></div><strong>${t.rv[i]}</strong></div>`).join('');$('#legend').innerHTML=t.legend.map(x=>`<div><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');$('#matrix').innerHTML=matrix();$('#alerts').innerHTML=t.alerts.map((x,i)=>`<div class="alert ${i===0?'risk':''}"><b>${x}</b><span class="pill">${i?'关注':'待处置'}</span><small>点击进入对象明细与行动建议</small></div>`).join('');$('#core').innerHTML=t.mode==='funnel'?`<div class="funnel">${['简历 486','投递 392','面试 218','Offer 104','签约 68'].map((x,i)=>`<div style="width:${95-i*14}%"><span>${x}</span><b>${100-i*17}%</b></div>`).join('')}</div>`:t.mode==='map'?`<div class="map"><div class="outline"></div>${[['南宁',55,58],['柳州',45,33],['桂林',65,25],['玉林',62,70],['钦州',38,73]].map(x=>`<button class="city" data-name="${x[0]}" style="left:${x[1]}%;top:${x[2]}%"></button>`).join('')}</div>`:t.mode==='matrix'?`<div class="matrix" style="height:95%">${matrix()}</div>`:line();$('#trend').innerHTML=line(t.mode==='funnel'?[42,49,51,56,59,62]:[58,63,69,76,83,91]);document.querySelectorAll('.city').forEach(b=>b.onclick=()=>toast('已下钻城市：'+b.dataset.name))}
function toast(s){$('#toast').textContent=s;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1800)}$('#theme').onchange=e=>{c=+e.target.value;render()};$('#prev').onclick=()=>{c=(c+4)%5;render()};$('#next').onclick=()=>{c=(c+1)%5;render()};$('#role').onchange=e=>toast('角色视角已切换：'+e.target.value);$('#period').onchange=e=>toast('统计周期：'+e.target.value);$('#scope').onchange=e=>toast('数据范围：'+e.target.value);$('#full').onclick=()=>document.documentElement.requestFullscreen?.();$('#ai').onclick=()=>toast('AI正在解读当前主题');$('#task').onclick=()=>toast('研判任务草稿已生成');$('#detail').onclick=()=>toast('已进入授权数据明细');$('#ask').onclick=()=>toast('AI交互中枢已打开');render();
</script></body></html>
