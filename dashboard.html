<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI数据驾驶舱｜五大主题原型</title><style>
:root{--bg:#06111d;--panel:#0b1d2c;--panel2:#0e2638;--line:#21465f;--cyan:#42d9ff;--green:#43dda8;--amber:#f3bf56;--red:#ff7289;--text:#e7f4fc;--muted:#7d9caf}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font:14px Arial,'Microsoft YaHei',sans-serif}body{background-image:linear-gradient(rgba(43,91,119,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(43,91,119,.08) 1px,transparent 1px),radial-gradient(circle at 50% -10%,#163c57,transparent 45%);background-size:40px 40px,40px 40px,auto}.app{min-width:1180px;padding:18px 22px}.top{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:14px}.brand small{color:var(--cyan);letter-spacing:2px}.brand h1{font-size:25px;margin:5px 0}.brand p{margin:0;color:var(--muted)}.filters{display:flex;gap:8px}.filters select,.filters button{height:38px;background:#0c2436;border:1px solid #2b5770;color:var(--text);border-radius:5px;padding:0 12px}.themes{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin:14px 0}.theme{cursor:pointer;text-align:left;padding:12px 13px;border:1px solid #21465f;background:#0a1d2d;color:var(--muted);border-radius:6px}.theme b{display:block;color:var(--text);margin:4px 0}.theme small{font-size:10px}.theme.active{border-color:var(--cyan);background:linear-gradient(135deg,#12374e,#0b2234);box-shadow:inset 0 -3px var(--cyan)}.theme.active span{color:var(--cyan)}.layout{display:grid;grid-template-columns:1fr 1.7fr 1fr;grid-template-rows:148px 370px 170px;gap:10px}.panel{background:linear-gradient(145deg,rgba(15,40,58,.96),rgba(7,23,36,.97));border:1px solid var(--line);border-radius:6px;padding:14px;overflow:hidden}.panel h2{font-size:15px;margin:3px 0 12px}.eyebrow{color:var(--cyan);font-size:10px;letter-spacing:1px}.kpis{grid-column:1/4;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;background:none;border:0;padding:0}.kpi{background:linear-gradient(135deg,#102b3f,#0a1c2a);border:1px solid var(--line);border-radius:6px;padding:16px}.kpi span{color:var(--muted);font-size:12px}.kpi strong{display:block;color:var(--cyan);font-size:28px;margin:8px 0 5px}.kpi em{font-style:normal;font-size:11px;color:var(--green)}.main{position:relative}.chart{height:255px;display:flex;align-items:end;gap:12px;padding:18px 10px 20px;border-left:1px solid #24445b;border-bottom:1px solid #24445b}.bar{flex:1;min-width:28px;background:linear-gradient(180deg,var(--cyan),#226b94);position:relative;border-radius:3px 3px 0 0;transition:.25s}.bar:hover{filter:brightness(1.3)}.bar span{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);white-space:nowrap}.bar b{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-size:10px}.rows{display:grid}.row{display:grid;grid-template-columns:28px 1fr auto auto;gap:8px;align-items:center;min-height:43px;border-bottom:1px solid #18364a}.row:last-child{border:0}.row i{font-style:normal;color:var(--cyan)}.row small{color:var(--muted)}.pill{font-size:10px;padding:4px 7px;border-radius:10px;background:#17374a;color:var(--green)}.pill.warn{color:var(--amber)}.pill.risk{color:var(--red)}.modules{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.module{cursor:pointer;min-height:62px;border:1px solid #20465f;background:#0c2233;color:var(--text);border-radius:5px;padding:9px;text-align:left}.module:hover,.module.active{border-color:var(--cyan);background:#123247}.module small{display:block;color:var(--muted);margin-top:5px;font-size:10px}.bottom-wide{grid-column:1/3}.actions button{display:block;width:100%;text-align:left;margin-bottom:7px;padding:9px;border:1px solid #264e68;background:#0c2233;color:var(--text);border-radius:4px;cursor:pointer}.actions button:hover{border-color:var(--cyan)}.toast{position:fixed;right:24px;bottom:24px;background:#102f43;border:1px solid var(--cyan);padding:12px 16px;border-radius:5px;opacity:0;transform:translateY(10px);transition:.2s}.toast.show{opacity:1;transform:none}.foot{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;padding-top:10px}.ai{color:var(--cyan);cursor:pointer}.empty{height:255px;display:grid;place-items:center;color:var(--muted)}
</style></head><body><div class="app"><header class="top"><div class="brand"><small>AI DATA COCKPIT · CUSTOMER CONFIRMED</small><h1 id="title">全校就业态势总览</h1><p id="subtitle">校领导视角：目标差距、学院贡献与结构风险</p></div><div class="filters"><select id="role"><option>校领导</option><option>学院负责人</option><option>就业中心</option><option>辅导员</option><option>产业合作专员</option></select><select id="period"><option>2025届</option><option>2024届</option><option>近三届</option></select><select id="scope"><option>全校</option><option>智能制造学院</option><option>信息工程学院</option></select><button id="full">全屏</button></div></header><nav class="themes" id="themes"></nav><main class="layout"><section class="kpis" id="kpis"></section><aside class="panel"><div class="eyebrow">RANKING / STRUCTURE</div><h2 id="leftTitle">学院就业排名</h2><div class="rows" id="ranking"></div></aside><section class="panel main"><div class="eyebrow">CORE VIEW</div><h2 id="mainTitle">近三届趋势</h2><div class="chart" id="chart"></div></section><aside class="panel"><div class="eyebrow">RISK / INSIGHT</div><h2 id="rightTitle">风险预警</h2><div class="rows" id="insights"></div></aside><section class="panel bottom-wide"><div class="eyebrow">MODULE DIRECTORY · CLICK TO DRILL DOWN</div><h2>当前主题完整模块</h2><div class="modules" id="modules"></div></section><aside class="panel actions"><div class="eyebrow">AI ACTION LOOP</div><h2>建议与行动</h2><button id="ai">AI 解读当前主题</button><button id="task">生成研判任务</button><button id="detail">查看数据明细</button></aside></main><footer class="foot"><span>统一指标口径 · 学生与就业数据 · 岗位与企业数据 · 权限脱敏审计</span><span class="ai" id="ask">数据透视 AI：输入问题驱动切页、筛选、高亮和下钻</span></footer></div><div class="toast" id="toast"></div><script>
const themes=[
{short:'态势',name:'全校就业态势总览',sub:'校领导视角：目标差距、学院贡献与结构风险',left:'学院就业排名',main:'近三届趋势',right:'风险预警',k:[['毕业生数','11,065','正式样本'],['去向落实率','91.47%','目标完成 98.4%'],['待就业人数','327','较上月 -42'],['留桂率','50.75%','区内就业贡献'],['专业对口度','86.79%','就业质量']],rank:['智能制造学院','交通运输学院','信息工程学院','商贸管理学院','艺术设计学院'],vals:[94,92,91,89,87],ins:['低落实学院 2 个','连续下降专业 3 个','集中待就业 327 人','流程异常记录 6 条'],mods:['就业核心指标','近三届趋势','学院就业排名','就业地区流向','就业行业与单位','就业质量概览','风险预警']},
{short:'学院',name:'学院和专业深度分析',sub:'学院负责人视角：专业短板、培养成效与改进空间',left:'专业落实矩阵',main:'学院—专业竞争力矩阵',right:'培养有效性预警',k:[['学院落实率','92.80%','高于校均 1.33pp'],['专业对口度','84.20%','低于校均 2.59pp'],['平均薪资','5,860','元/月'],['就业满意度','88.60%','同比 +2.1pp'],['升学率','17.52%','近三届最高']],rank:['新能源汽车技术','智能控制技术','机械制造','工业机器人','工业设计'],vals:[96,93,91,87,84],ins:['低对口专业 2 个','证书溢价不足 3 项','实训转正率 42%','期待吻合偏低 1 项'],mods:['学院画像总卡','专业落实矩阵','专业对口度','升学与灵活就业','职业期待吻合','稳定性与满意度','培养有效性']},
{short:'供需',name:'市场需求与人才画像',sub:'就业中心视角：市场机会、人岗匹配与企业渠道',left:'热招岗位 Top10',main:'专业—岗位—技能匹配矩阵',right:'技能缺口榜',k:[['有效企业','2,416','近三月 +186'],['有效岗位','12,684','新增 +18.2%'],['需求人数','28,930','竞争度 0.86'],['中高匹配人才','4,285','覆盖率 67.4%'],['平均薪资','6,420','元/月']],rank:['智能制造工程师','新能源维修','工业软件开发','机器视觉','PLC工程师'],vals:[95,91,88,83,79],ins:['PLC编程 缺口326','机器视觉 缺口214','数字孪生 缺口188','工业互联网 缺口165'],mods:['市场需求总览','热招岗位Top10','技能需求热力','本校人才画像','人岗匹配指数','供需比与缺口','薪资与机会','企业反馈']},
{short:'困难',name:'就业困难群体专题',sub:'辅导员视角：困难识别、阻断环节与今日任务',left:'学院困难比重',main:'求职转化漏斗',right:'待办与督办',k:[['困难学生','486','占毕业生 4.39%'],['困难生落实率','79.80%','低于校均 11.67pp'],['帮扶覆盖率','96.30%','今日新增 12'],['连续未进展','68','需重点跟进'],['解除困难率','62.40%','本月 +5.8pp']],rank:['商贸管理学院','艺术设计学院','信息工程学院','交通运输学院','智能制造学院'],vals:[86,73,62,48,35],ins:['超期未联系 18 人','长期零投递 24 人','面试停滞 16 人','Offer未签约 10 人'],mods:['困难群体总览','学院困难比重','困难类型分析','求职转化漏斗','宏观帮扶举措','个性化推荐','帮扶成效','待办与督办']},
{short:'产业',name:'智能制造产业人才供应',sub:'产业合作视角：人才贡献、重点企业与合作空间',left:'输送企业 Top10',main:'广西智能制造合作地图',right:'核心技能缺口',k:[['本届输送','1,864','智能制造人才'],['留桂率','68.20%','产业区内贡献'],['专业对口率','91.30%','高于校均'],['合作企业','328','连续招录 76 家'],['平均薪资','6,880','元/月']],rank:['上汽通用五菱','柳工集团','广西玉柴','东风柳汽','桂林福达'],vals:[96,89,82,75,68],ins:['工业机器人 缺口242','PLC 缺口218','MES 缺口176','CAD/CAE 缺口153'],mods:['人才输送总览','输送企业Top10','广西合作地图','产业贡献分布','岗位薪资','核心技能','合作效能']}
];let current=0;const $=s=>document.querySelector(s);function render(i){current=i;const t=themes[i];$('#title').textContent=t.name;$('#subtitle').textContent=t.sub;$('#leftTitle').textContent=t.left;$('#mainTitle').textContent=t.main;$('#rightTitle').textContent=t.right;$('#themes').innerHTML=themes.map((x,n)=>`<button class="theme ${n===i?'active':''}" data-i="${n}"><span>0${n+1}</span><b>${x.name}</b><small>${x.short}主题 · 点击切换</small></button>`).join('');$('#kpis').innerHTML=t.k.map(x=>`<div class="kpi"><span>${x[0]}</span><strong>${x[1]}</strong><em>${x[2]}</em></div>`).join('');$('#ranking').innerHTML=t.rank.map((x,n)=>`<div class="row"><i>0${n+1}</i><span>${x}</span><b>${t.vals[n]}${i===3?'人':'%'}</b><span class="pill ${n>2?'warn':''}">${n<2?'领先':'关注'}</span></div>`).join('');$('#chart').innerHTML=t.vals.map((v,n)=>`<div class="bar" style="height:${Math.max(26,v)}%"><b>${v}</b><span>${['一','二','三','四','五'][n]}</span></div>`).join('');$('#insights').innerHTML=t.ins.map((x,n)=>`<div class="row"><i>0${n+1}</i><span>${x}</span><span class="pill ${n<2?'risk':'warn'}">${n<2?'处置':'关注'}</span></div>`).join('');$('#modules').innerHTML=t.mods.map((x,n)=>`<button class="module" data-m="${x}"><b>${String(n+1).padStart(2,'0')} ${x}</b><small>点击查看指标、趋势与明细</small></button>`).join('');bind()}
function toast(s){$('#toast').textContent=s;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1800)}function bind(){document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>render(+b.dataset.i));document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.module').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#mainTitle').textContent=b.dataset.m;toast('已下钻：'+b.dataset.m)})}$('#role').onchange=e=>toast('已切换角色：'+e.target.value);$('#period').onchange=e=>toast('统计周期：'+e.target.value);$('#scope').onchange=e=>toast('数据范围：'+e.target.value);$('#full').onclick=()=>document.documentElement.requestFullscreen?.();$('#ai').onclick=()=>toast('AI 正在解读「'+themes[current].name+'」');$('#task').onclick=()=>toast('已生成当前主题研判任务草稿');$('#detail').onclick=()=>toast('已打开授权范围内数据明细');$('#ask').onclick=()=>toast('AI 交互中枢已就绪');render(0);
</script></body></html>
